name: Keep Server Alive

on:
  schedule:
    # 매 10분마다 실행 (크론 표현식)
    - cron: '*/10 * * * *'
  # 원할 때 수동으로 테스트해 볼 수 있도록 추가
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server with curl
        # 서버 주소로 요청을 보냄 (-s: 진행률 숨김, -L: 리다이렉트 추적)
        run: curl -sL https://book-review-lbg7.onrender.com/ > /dev/null