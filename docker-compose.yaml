version: "3.9"

services:

  mongo:
    image: mongo:7
    container_name: macro-news-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build: .
    container_name: macro-news-app
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      MONGODB_URI: mongodb://mongo:27017/macro_news
    depends_on:
      - mongo

volumes:
  mongo_data: