<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content})}">
<th:block th:fragment="content">
    <section class="mb-4 d-flex flex-column flex-md-row justify-content-between align-items-start gap-3">
        <div>
            <h1 class="h3 fw-bold mb-1" th:text="#{admin.news.heading}">Admin News Ingestion</h1>
            <p class="text-secondary mb-0" th:text="#{admin.news.manual.subheading}">Manually ingest a single news event.</p>
        </div>
        <div class="d-flex flex-wrap gap-2">
            <a class="btn btn-primary" th:href="@{/admin/news/manual}" th:text="#{admin.news.manual.tab}">Manual Ingestion</a>
            <a class="btn btn-outline-primary" th:href="@{/admin/news/auto}" th:text="#{admin.news.auto.tab}">Automatic Ingestion</a>
            <a class="btn btn-outline-secondary" th:href="@{/news}" th:text="#{admin.news.viewNews}">View News</a>
        </div>
    </section>

    <section class="mb-4">
        <form th:action="@{/admin/news/ingest}" th:object="${adminIngestionRequest}" method="post"
              class="card border-0 shadow-sm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="card-body d-flex flex-column gap-3">
                <div>
                    <label class="form-label" for="source" th:text="#{form.source}">Source</label>
                    <input id="source" type="text" class="form-control" th:field="*{source}" required>
                </div>
                <div>
                    <label class="form-label" for="title" th:text="#{form.title}">Title</label>
                    <input id="title" type="text" class="form-control" th:field="*{title}" required>
                </div>
                <div>
                    <label class="form-label" for="summary" th:text="#{form.summary}">Summary</label>
                    <textarea id="summary" class="form-control" th:field="*{summary}" rows="3"></textarea>
                </div>
                <div>
                    <label class="form-label" for="content" th:text="#{form.content}">Content</label>
                    <textarea id="content" class="form-control" th:field="*{content}" rows="8"></textarea>
                </div>
                <div>
                    <label class="form-label" for="url" th:text="#{form.url}">URL</label>
                    <input id="url" type="url" class="form-control" th:field="*{url}">
                </div>
                <div>
                    <label class="form-label" for="publishedAt" th:text="#{form.publishedAt}">Published At</label>
                    <input id="publishedAt" type="datetime-local" class="form-control" th:field="*{publishedAt}" required>
                </div>
            </div>
            <div class="card-footer bg-white border-0 d-flex justify-content-end gap-2">
                <a class="btn btn-outline-secondary" th:href="@{/news}" th:text="#{form.cancel}">Cancel</a>
                <button class="btn btn-primary" type="submit" th:text="#{admin.news.manual.submit}">Ingest Manually</button>
            </div>
        </form>
    </section>
</th:block>
</html>
