<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<th:block th:fragment="autoBatchStatusPanel">
    <section id="auto-batch-status-panel" th:if="${autoBatchStatus != null}"
             class="card border-0 shadow-sm"
             th:attr="data-status-url=${autoBatchStatusUrl},data-requested-count=${autoBatchStatus.requestedCount},data-returned-count=${autoBatchStatus.returnedCount},data-item-ids=${autoBatchItemIdsCsv},data-ingested-count=${autoBatchStatus.ingestedCount}">
        <div class="card-body d-flex flex-column gap-3">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
                <div>
                    <h2 class="h5 fw-bold mb-1">Recent Auto Ingestion Snapshot</h2>
                    <p class="text-secondary mb-0 small">Current status view for the most recent automatic ingestion batch.</p>
                </div>
                <div class="d-flex flex-wrap gap-2 small">
                    <span class="badge text-bg-light border" th:text="${'Requested ' + autoBatchStatus.requestedCount}"></span>
                    <span class="badge text-bg-light border" th:text="${'Returned ' + autoBatchStatus.returnedCount}"></span>
                    <span class="badge text-bg-light border" th:text="${'INGESTED ' + autoBatchStatus.ingestedCount}"></span>
                    <span class="badge text-bg-light border" th:text="${'ANALYZED ' + autoBatchStatus.analyzedCount}"></span>
                    <span class="badge text-bg-light border" th:text="${'FAILED ' + autoBatchStatus.failedCount}"></span>
                </div>
            </div>
            <div class="text-secondary small" th:if="${autoBatchStatus.ingestedCount > 0}">Updating automatically while analysis is still pending.</div>
            <div class="table-responsive">
                <table class="table table-sm align-middle mb-0">
                    <thead>
                    <tr>
                        <th>Title</th>
                        <th class="text-nowrap">Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(autoBatchStatus.items)}">
                        <td colspan="2" class="text-secondary">No batch items available.</td>
                    </tr>
                    <tr th:each="item : ${autoBatchStatus.items}">
                        <td>
                            <div th:text="${item.title ?: 'Untitled'}"></div>
                            <div class="text-secondary small" th:if="${item.priorityScore > 0}" th:text="${'Priority ' + item.priorityScore}"></div>
                        </td>
                        <td class="text-nowrap">
                            <span class="badge"
                                  th:classappend="${item.status != null and item.status.name() == 'ANALYZED' ? ' bg-success' : (item.status != null and item.status.name() == 'FAILED' ? ' bg-danger' : ' bg-secondary')}"
                                  th:text="${item.status ?: 'UNKNOWN'}"></span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </section>
</th:block>
</html>
