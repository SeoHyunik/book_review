<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content})}">
<th:block th:fragment="content">
    <section class="mb-4 d-flex flex-column flex-md-row justify-content-between align-items-start gap-3">
        <div>
            <h1 class="h3 fw-bold mb-1">Admin News Ingestion</h1>
            <p class="text-secondary mb-0">Fetch latest external news automatically.</p>
        </div>
        <div class="d-flex flex-wrap gap-2">
            <a class="btn btn-outline-primary" th:href="@{/admin/news/manual}">Manual Ingestion</a>
            <a class="btn btn-primary" th:href="@{/admin/news/auto}">Automatic Ingestion</a>
            <a class="btn btn-outline-secondary" th:href="@{/news}">View News</a>
        </div>
    </section>

    <section class="mb-4" th:if="${newsApiConfigured == false}">
        <div class="alert alert-warning mb-0" role="alert">
            Automatic ingestion requires external news API configuration (`news.api.key`).
            Manual ingestion is still available.
        </div>
    </section>

    <section class="mb-4">
        <form th:action="@{/admin/news/ingest-api}" method="post" class="card border-0 shadow-sm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="card-body d-flex flex-column flex-md-row align-items-md-end gap-3 justify-content-between">
                <div>
                    <label class="form-label" for="pageSize">Fetch Page Size</label>
                    <input id="pageSize" name="pageSize" type="number" min="1" max="50" value="10" class="form-control"
                           th:disabled="${newsApiConfigured == false}">
                </div>
                <button class="btn btn-primary" type="submit" th:disabled="${newsApiConfigured == false}">Fetch Latest News</button>
            </div>
        </form>
    </section>
</th:block>
</html>
