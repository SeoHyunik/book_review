<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(content)"
      th:with="resolvedPageTitle=${pageTitleKey != null ? #messages.msg(pageTitleKey) : (pageTitle != null ? pageTitle : #messages.msg('app.name'))}, resolvedPageDescription=${pageDescriptionKey != null ? #messages.msg(pageDescriptionKey) : (pageDescription != null ? pageDescription : #messages.msg('app.description'))}, resolvedOgTitle=${ogTitleKey != null ? #messages.msg(ogTitleKey) : (ogTitle != null ? ogTitle : resolvedPageTitle)}, resolvedOgDescription=${ogDescriptionKey != null ? #messages.msg(ogDescriptionKey) : (ogDescription != null ? ogDescription : resolvedPageDescription)}"
      th:attr="lang=${#locale.language}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${resolvedPageTitle}"></title>
    <meta name="description" th:content="${resolvedPageDescription}"/>
    <meta property="og:type" content="website"/>
    <meta property="og:title" th:content="${resolvedOgTitle}"/>
    <meta property="og:description" th:content="${resolvedOgDescription}"/>
    <meta property="og:url" th:content="${ogUrl} ?: ''"/>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>

    <script>
        (function () {
            const saved = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved === 'light' || saved === 'dark' ? saved : (systemPrefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-bs-theme', theme);
            document.documentElement.classList.add('theme-preload');
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/styles.css}"/>
    <link rel="stylesheet" th:href="@{/css/theme-fab.css}"/>
    <link rel="stylesheet" th:href="@{/css/theme-overrides.css}"/>
    <script th:src="@{/js/theme-toggle.js}" defer></script>
    <script th:src="@{/js/flash-alert.js}" defer></script>
</head>
<body class="bg-body-tertiary">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand fw-semibold" th:href="@{/news}" th:text="#{app.name}">Macro News</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav" aria-controls="nav"
                aria-expanded="false" th:attr="aria-label=#{layout.toggleNav}">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto gap-lg-2 align-items-lg-center">
                <li class="nav-item"><a class="nav-link" th:href="@{/news}" th:text="#{nav.news}">News</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/news/manual}" th:text="#{nav.admin.manual}">Admin Manual</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="btn btn-light text-primary fw-semibold ms-lg-1" th:href="@{/admin/news/auto}" th:text="#{nav.admin.auto}">Admin Auto</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/openai-usage}" th:text="#{nav.admin.usage}">Admin Usage</a>
                </li>
                <li class="nav-item">
                    <form th:action="${currentPath}" method="get" class="d-flex align-items-center gap-1 ms-lg-2">
                        <input th:if="${currentStatus != null and !#strings.isEmpty(currentStatus)}" type="hidden" name="status" th:value="${currentStatus}"/>
                        <input th:if="${currentSort != null and !#strings.isEmpty(currentSort)}" type="hidden" name="sort" th:value="${currentSort}"/>
                        <input th:if="${currentPage != null and !#strings.isEmpty(currentPage)}" type="hidden" name="page" th:value="${currentPage}"/>
                        <button type="submit" name="lang" value="ko" class="btn btn-sm"
                                th:classappend="${currentLang == 'ko' ? ' btn-light text-primary' : ' btn-outline-light'}">KO</button>
                        <span class="text-white-50 small">/</span>
                        <button type="submit" name="lang" value="en" class="btn btn-sm"
                                th:classappend="${currentLang == 'en' ? ' btn-light text-primary' : ' btn-outline-light'}">EN</button>
                    </form>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="nav-link" th:href="@{/login}" th:text="#{nav.login}">Login</a>
                </li>
                <li class="nav-item" sec:authorize="isAnonymous()">
                    <a class="btn btn-outline-light btn-sm ms-lg-1" th:href="@{/register}" th:text="#{nav.register}">Register</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="navbar-text text-white-50 small"><span th:text="#{nav.hello}">Hello,</span> <strong sec:authentication="name"></strong></span>
                </li>
                <li class="nav-item ms-lg-2" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-outline-light btn-sm" th:text="#{nav.logout}">Logout</button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container py-5 pb-5">
    <div class="row justify-content-center">
        <div class="col-12 col-lg-10 col-xl-9">
            <header class="mb-4 d-flex align-items-center gap-2">
                <span class="badge bg-info-subtle text-info fw-semibold text-uppercase" th:text="#{app.name}">Macro News</span>
                <p class="mb-0 text-secondary" th:text="#{app.description}">Macro News Interpretation Service</p>
            </header>

            <div th:if="${successMessage}" class="flash-alert alert alert-success d-flex align-items-center gap-2" role="alert">
                <i class="bi bi-check-circle-fill"></i>
                <div th:utext="${#strings.replace(#strings.escapeXml(successMessage), '\\n', '<br/>')}"></div>
            </div>
            <div th:if="${warningMessage}" class="flash-alert alert alert-warning d-flex align-items-center gap-2" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <div th:utext="${#strings.replace(#strings.escapeXml(warningMessage), '\\n', '<br/>')}"></div>
            </div>
            <div th:if="${errorMessage}" class="flash-alert alert alert-danger d-flex align-items-center gap-2" role="alert">
                <i class="bi bi-x-circle-fill"></i>
                <div th:utext="${#strings.replace(#strings.escapeXml(errorMessage), '\\n', '<br/>')}"></div>
            </div>

            <main th:replace="${content}"></main>
        </div>
    </div>
</div>

<footer class="fixed-bottom bg-body-tertiary text-center text-secondary small py-2">
    <div class="container">
        <p class="mb-1" th:text="#{layout.footer}">Macro News Interpreter crafted with Spring Boot &amp; Thymeleaf by Fastlaner</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<div class="fab-stack" aria-label="Floating controls">
    <button id="scroll-top-fab" type="button" th:attr="aria-label=#{layout.scrollTop}">
        <i class="bi bi-arrow-up"></i>
    </button>
    <button id="theme-fab" type="button" th:attr="aria-label=#{theme.toggle}">
        <i id="theme-fab-icon" class="bi bi-moon-stars-fill"></i>
    </button>
</div>
</body>
</html>
