<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::content})}">
<th:block th:fragment="content">
    <section class="mb-4 d-flex flex-column flex-md-row justify-content-between align-items-start gap-3">
        <div>
            <h1 class="h3 fw-bold mb-1">Macro News</h1>
            <p class="text-secondary mb-0">Recent ingested and interpreted news events.</p>
        </div>
        <div class="d-flex flex-wrap gap-2" sec:authorize="hasRole('ADMIN')">
            <a class="btn btn-outline-primary" th:href="@{/admin/news/manual}">Manual Ingestion</a>
            <a class="btn btn-primary" th:href="@{/admin/news/auto}">Automatic Ingestion</a>
        </div>
    </section>

    <section>
        <div class="table-responsive">
            <table class="table table-sm table-striped align-middle mb-0">
                <thead>
                <tr>
                    <th style="width: 40%;">Title</th>
                    <th class="text-nowrap">Source</th>
                    <th class="text-nowrap">Published At</th>
                    <th>Status</th>
                    <th>Interpretation</th>
                    <th class="text-end text-nowrap">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(newsItems)}">
                    <td colspan="6" class="text-secondary">No news events found.</td>
                </tr>
                <tr th:each="news : ${newsItems}">
                    <td>
                        <div style="white-space: normal; word-break: break-word;" th:text="${news.title ?: 'Untitled'}"></div>
                        <div class="text-secondary small" th:if="${news.priorityScore > 0}" th:text="${'Priority ' + news.priorityScore}"></div>
                    </td>
                    <td class="small text-nowrap" th:text="${news.source ?: '-'}"></td>
                    <td class="small text-nowrap" th:text="${news.publishedAt ?: '-'}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="${news.status != null and news.status.name() == 'ANALYZED' ? ' bg-success' : (news.status != null and news.status.name() == 'FAILED' ? ' bg-danger' : ' bg-secondary')}"
                              th:text="${news.status ?: 'UNKNOWN'}"></span>
                    </td>
                    <td>
                        <span th:if="${news.status != null and news.status.name() == 'ANALYZED'}" class="text-success">Available</span>
                        <span th:if="${news.status != null and news.status.name() == 'INGESTED'}" class="text-secondary">Pending</span>
                        <span th:if="${news.status != null and news.status.name() == 'FAILED'}" class="text-danger">Failed</span>
                        <span th:if="${news.status == null}" class="text-secondary">Unknown</span>
                        <span th:if="${news.status != null and news.status.name() == 'ANALYZED' and news.macroSummary != null and !#strings.isEmpty(news.macroSummary)}"
                              class="text-secondary small" th:text="${' - ' + news.macroSummary}"></span>
                    </td>
                    <td class="text-end text-nowrap">
                        <div class="d-inline-flex flex-wrap justify-content-end gap-1">
                            <a class="btn btn-sm btn-outline-primary" th:href="@{'/news/' + ${news.id}}">Detail</a>
                            <th:block sec:authorize="hasRole('ADMIN')">
                                <form th:action="@{'/admin/news/' + ${news.id} + '/reinterpret'}" method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="returnTo" value="/news"/>
                                    <button type="submit" class="btn btn-sm btn-outline-warning">Re-interpret</button>
                                </form>
                                <form th:action="@{'/admin/news/' + ${news.id} + '/delete'}" method="post" class="d-inline"
                                      onsubmit="return confirm('Delete this news item?');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="returnTo" value="/news"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                </form>
                            </th:block>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</th:block>
</html>
