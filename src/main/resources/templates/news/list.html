<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security"
      th:replace="~{fragments/layout :: layout(~{::content})}">
<th:block th:fragment="content">
    <section class="mb-4 d-flex flex-column flex-md-row justify-content-between align-items-start gap-3">
        <div>
            <h1 class="h3 fw-bold mb-1">Macro News</h1>
            <p class="text-secondary mb-0">Recent ingested and interpreted news events.</p>
        </div>
        <div class="d-flex flex-wrap gap-2" sec:authorize="hasRole('ADMIN')">
            <a class="btn btn-outline-primary" th:href="@{/admin/news/manual}">Manual Ingestion</a>
            <a class="btn btn-primary" th:href="@{/admin/news/auto}">Automatic Ingestion</a>
        </div>
    </section>

    <section class="mb-3">
        <div class="d-flex flex-wrap gap-2 align-items-center">
            <span class="text-secondary small">Filter</span>
            <a class="btn btn-sm"
               th:classappend="${#strings.isEmpty(selectedStatus) ? ' btn-primary' : ' btn-outline-secondary'}"
               th:href="@{/news}">All</a>
            <a class="btn btn-sm"
               th:classappend="${selectedStatus == 'INGESTED' ? ' btn-primary' : ' btn-outline-secondary'}"
               th:href="@{/news(status='INGESTED')}">Ingested</a>
            <a class="btn btn-sm"
               th:classappend="${selectedStatus == 'ANALYZED' ? ' btn-primary' : ' btn-outline-secondary'}"
               th:href="@{/news(status='ANALYZED')}">Analyzed</a>
            <a class="btn btn-sm"
               th:classappend="${selectedStatus == 'FAILED' ? ' btn-primary' : ' btn-outline-secondary'}"
               th:href="@{/news(status='FAILED')}">Failed</a>
        </div>
    </section>

    <section>
        <div class="table-responsive">
            <table class="table table-sm table-striped align-middle mb-0">
                <thead>
                <tr>
                    <th style="width: 42%;">Title</th>
                    <th class="text-nowrap" style="width: 12%;">Source</th>
                    <th class="text-nowrap" style="width: 14%;">Published At</th>
                    <th class="text-nowrap" style="width: 10%;">Status</th>
                    <th style="width: 12%;">Interpretation</th>
                    <th class="text-end text-nowrap" style="width: 10%;">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(newsItems)}">
                    <td colspan="6" class="text-secondary">No news events found.</td>
                </tr>
                <tr th:each="news : ${newsItems}">
                    <td class="py-2">
                        <div class="fw-semibold lh-sm mb-1"
                             style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.35; max-height: 2.7em; word-break: break-word;"
                             th:text="${news.title ?: 'Untitled'}"></div>
                        <div class="text-secondary small" th:if="${news.priorityScore > 0}" th:text="${'Priority ' + news.priorityScore}"></div>
                    </td>
                    <td class="small text-nowrap text-truncate py-2" style="max-width: 10rem;" th:text="${news.source ?: '-'}"></td>
                    <td class="small text-nowrap py-2" th:text="${news.publishedAt ?: '-'}"></td>
                    <td class="py-2">
                        <span class="badge"
                              th:classappend="${news.status != null and news.status.name() == 'ANALYZED' ? ' bg-success' : (news.status != null and news.status.name() == 'FAILED' ? ' bg-danger' : ' bg-secondary')}"
                              th:text="${news.status ?: 'UNKNOWN'}"></span>
                    </td>
                    <td class="py-2">
                        <div th:if="${news.status != null and news.status.name() == 'ANALYZED'}" class="fw-semibold small text-success">Available</div>
                        <div th:if="${news.status != null and news.status.name() == 'INGESTED'}" class="fw-semibold small text-secondary">Pending</div>
                        <div th:if="${news.status != null and news.status.name() == 'FAILED'}" class="fw-semibold small text-danger">Failed</div>
                        <div th:if="${news.status == null}" class="fw-semibold small text-secondary">Unknown</div>
                        <div th:if="${news.status != null and news.status.name() == 'ANALYZED' and news.macroSummary != null and !#strings.isEmpty(news.macroSummary)}"
                             class="text-secondary small lh-sm mt-1" th:text="${news.macroSummary}"></div>
                    </td>
                    <td class="text-end text-nowrap py-2">
                        <div class="d-inline-flex flex-wrap justify-content-end gap-1 align-items-center">
                            <a class="btn btn-sm btn-outline-primary text-nowrap" th:href="@{'/news/' + ${news.id}}">Detail</a>
                            <th:block sec:authorize="hasRole('ADMIN')">
                                <form th:action="@{'/admin/news/' + ${news.id} + '/reinterpret'}" method="post" class="d-inline">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="returnTo" value="/news"/>
                                    <input type="hidden" name="status" th:value="${selectedStatus}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-warning text-nowrap">Re-interpret</button>
                                </form>
                                <form th:action="@{'/admin/news/' + ${news.id} + '/delete'}" method="post" class="d-inline"
                                      onsubmit="return confirm('Delete this news item?');">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="returnTo" value="/news"/>
                                    <input type="hidden" name="status" th:value="${selectedStatus}"/>
                                    <button type="submit" class="btn btn-sm btn-outline-danger text-nowrap">Delete</button>
                                </form>
                            </th:block>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</th:block>
</html>
