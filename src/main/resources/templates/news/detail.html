<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content})}">
<th:block th:fragment="content">
    <section class="mb-4 d-flex justify-content-between align-items-start gap-3">
        <div>
            <h1 class="h3 fw-bold mb-1" th:text="${newsEvent.title}">News Title</h1>
            <p class="text-secondary mb-0"><span th:text="${newsEvent.source}">Source</span></p>
        </div>
        <a class="btn btn-outline-primary" th:href="@{/news}">Back to List</a>
    </section>

    <section class="card border-0 shadow-sm">
        <div class="card-body d-flex flex-column gap-3">
            <div><strong>Summary:</strong> <span th:text="${newsEvent.summary}"></span></div>
            <div><strong>Content:</strong> <pre class="mb-0" th:text="${newsEvent.content}"></pre></div>
            <div><strong>URL:</strong> <a th:href="${newsEvent.url}" th:text="${newsEvent.url}" target="_blank" rel="noopener noreferrer"></a></div>
            <div><strong>Published At:</strong> <span th:text="${newsEvent.publishedAt}"></span></div>
            <div><strong>Ingested At:</strong> <span th:text="${newsEvent.ingestedAt}"></span></div>
            <div><strong>Status:</strong> <span class="badge bg-secondary" th:text="${newsEvent.status}"></span></div>
            <div th:if="${newsEvent.duplicateOfId != null and !#strings.isEmpty(newsEvent.duplicateOfId)}">
                <strong>Duplicate Of ID:</strong>
                <span th:text="${newsEvent.duplicateOfId}"></span>
            </div>
        </div>
    </section>
</th:block>
</html>
