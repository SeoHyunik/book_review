server:
  port: ${PORT:8080}

spring:
  application:
    name: macro_news

  messages:
    encoding: UTF-8

  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/macro_news}
    transactions:
      enabled: true # Replica set required in production for this to take effect

  cache:
    type: simple

  thymeleaf:
    cache: false

  web:
    resources:
      cache:
        period: 0

  devtools:
    restart:
      additional-paths: src/main/resources
      enabled: true
    livereload:
      enabled: true

#    oauth2:
#      client:
#        registration:
#          google:
#            client-id: ${GOOGLE_CLIENT_ID:}
#            client-secret: ${GOOGLE_CLIENT_SECRET:}
#            scope:
#              - openid
#              - profile
#              - email

  mvc:
    problemdetails:
      enabled: true

  mail:
    host: ${SPRING_MAIL_HOST:}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
openai:
  api-key: ${OPENAI_API_KEY:}
  api-url: ${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
  models-url: https://api.openai.com/v1/models
  model: ${OPENAI_MODEL:gpt-4o}
  max-tokens: ${OPENAI_MAX_TOKENS:800}
  temperature: ${OPENAI_TEMPERATURE:0.2}
  macro-prompt-file: classpath:ai/prompts/macro_interpretation_prompt.json
  forecast-prompt-file: classpath:ai/prompts/market_forecast_aggregation_prompt.json
  featured-market-summary-prompt-file: classpath:ai/prompts/featured_market_summary_prompt.json
  pricing:
    primary-model-name: ${OPENAI_PRICING_PRIMARY_MODEL:${OPENAI_MODEL:gpt-4o}}
    primary-model:
      prompt-per-1k-usd: ${OPENAI_PRICING_PRIMARY_MODEL_PROMPT_PER_1K_USD:0.005}
      completion-per-1k-usd: ${OPENAI_PRICING_PRIMARY_MODEL_COMPLETION_PER_1K_USD:0.015}
    default:
      prompt-per-1k-usd: ${OPENAI_PRICING_DEFAULT_PROMPT_PER_1K_USD:0.005}
      completion-per-1k-usd: ${OPENAI_PRICING_DEFAULT_COMPLETION_PER_1K_USD:0.015}
  cost:
    krw-fallback-rate: ${OPENAI_COST_KRW_FALLBACK_RATE:1350.0}
    daily-days: ${OPENAI_COST_DAILY_DAYS:7}
    monthly-months: ${OPENAI_COST_MONTHLY_MONTHS:6}

jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:}


news:
  api:
    base-url: https://newsapi.org/v2/top-headlines
    search-url: https://newsapi.org/v2/everything
    key: ${NEWS_API_KEY:}
    country: us
    category: business
    default-limit: 5
    # Primary foreign/global NewsAPI query. Override with NEWS_API_RECENT_QUERY.
    recent-query: ${NEWS_API_RECENT_QUERY:market OR stocks OR economy OR inflation OR fed OR tariff OR oil OR semiconductor OR korea OR kospi}
    # Macro relevance filter applied to title + description. Override with NEWS_API_FILTER_KEYWORDS.
    filter-keywords: ${NEWS_API_FILTER_KEYWORDS:korea,kospi,kosdaq,volatility,oil,usd,interest rate,inflation,gold,semiconductor,tariff,fed}
    recency-hours: 72

logging:
  config: classpath:log4j2-spring.xml

app:
  admin:
    allowed-usernames: ${APP_ADMIN_ALLOWED_USERNAMES:admin01}
    bootstrap-username: ${APP_BOOTSTRAP_ADMIN_USERNAME:admin01}
    bootstrap-password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:kqU58JuYwHS!}
    bootstrap-email: ${APP_BOOTSTRAP_ADMIN_EMAIL:hos0917@naver.com}
  ingestion:
    business-timezone: ${APP_INGESTION_BUSINESS_TIMEZONE:Asia/Seoul}
    domestic-start-hour: ${APP_INGESTION_DOMESTIC_START_HOUR:5}
    domestic-end-hour: ${APP_INGESTION_DOMESTIC_END_HOUR:22}
    breaking-bonus-minutes: ${APP_INGESTION_BREAKING_BONUS_MINUTES:45}
    preferred-source-bonus-minutes: ${APP_INGESTION_PREFERRED_SOURCE_BONUS_MINUTES:15}
    scheduler:
      enabled: ${APP_INGESTION_SCHEDULER_ENABLED:false}
      cron: ${APP_INGESTION_SCHEDULER_CRON:0 */30 * * * *}
      page-size: ${APP_INGESTION_SCHEDULER_PAGE_SIZE:5}
  keep-alive:
    # Static gate for keep-alive availability. Default remains false because external uptime monitoring
    # is more reliable than self-calling the same Render public URL from inside the app.
    enabled: ${APP_KEEP_ALIVE_ENABLED:false}
    # Runtime toggle state is in-memory only and resets on restart or redeploy.
    cron: ${APP_KEEP_ALIVE_CRON:0 */10 * * * *}
    # Required for effective keep-alive execution. Prefer an external monitor or GitHub Actions ping.
    target-url: ${APP_KEEP_ALIVE_TARGET_URL:}
  notification:
    email:
      # Static gate for email notification availability. Admin runtime toggle can only operate when this is true.
      enabled: ${APP_NOTIFICATION_EMAIL_ENABLED:false}
      # Required for effective email notification delivery.
      recipient: ${APP_NOTIFICATION_EMAIL_RECIPIENT:}
      # Spring mail sender configuration is also required; runtime toggle state resets on restart or redeploy.
      from: ${APP_NOTIFICATION_EMAIL_FROM:}
  news:
    global:
      enabled: ${APP_NEWS_GLOBAL_ENABLED:true}
      max-age-hours: ${APP_NEWS_GLOBAL_MAX_AGE_HOURS:24}
    naver:
      enabled: ${APP_NEWS_NAVER_ENABLED:false}
      base-url: ${APP_NEWS_NAVER_BASE_URL:https://openapi.naver.com}
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
      # Override with APP_NEWS_NAVER_QUERIES. If left blank, NAVER falls back to a safe built-in
      # domestic query set: 코스피, 코스닥, 환율, 금리, 유가, 반도체, 연준.
      # Safe fallback queries: 코스피, 코스닥, 환율, 금리, 유가, 반도체, 연준.
      queries: ${APP_NEWS_NAVER_QUERIES:}
      display: ${APP_NEWS_NAVER_DISPLAY:5}
      start: ${APP_NEWS_NAVER_START:1}
      max-age-hours: ${APP_NEWS_NAVER_MAX_AGE_HOURS:12}
  market:
    fx:
      enabled: ${APP_MARKET_FX_ENABLED:false}
      base-url: ${APP_MARKET_FX_BASE_URL:https://v6.exchangerate-api.com}
      api-key: ${EXCHANGE_RATE_API_KEY:}
    gold:
      enabled: ${APP_MARKET_GOLD_ENABLED:false}
      base-url: ${APP_MARKET_GOLD_BASE_URL:https://api.metalpriceapi.com/v1/latest}
      api-key: ${METALPRICE_API_KEY:}
    oil:
      enabled: ${APP_MARKET_OIL_ENABLED:false}
      url: ${APP_MARKET_OIL_URL:https://api.oilpriceapi.com/v1/prices/latest}
      api-key: ${OILPRICE_API_KEY:}
    index:
      provider: ${APP_MARKET_INDEX_PROVIDER:twelvedata}
      enabled: ${APP_MARKET_INDEX_ENABLED:false}
      api-key: ${TWELVEDATA_API_KEY:}
      symbol:
        kospi: ${APP_MARKET_INDEX_SYMBOL_KOSPI:}
        kosdaq: ${APP_MARKET_INDEX_SYMBOL_KOSDAQ:}
  forecast:
    enabled: ${MARKET_FORECAST_ENABLED:true}
    window-hours: ${MARKET_FORECAST_WINDOW_HOURS:3}
    max-news-items: ${MARKET_FORECAST_MAX_NEWS_ITEMS:20}
    cache-minutes: ${MARKET_FORECAST_CACHE_MINUTES:15}
  featured:
    market-summary:
      # Deterministic recent analyzed-news aggregation for the main featured card.
      # If not enough recent analyzed items exist, the homepage falls back to the
      # existing market forecast snapshot or featured news behavior.
      enabled: ${APP_FEATURED_MARKET_SUMMARY_ENABLED:true}
      window-hours: ${APP_FEATURED_MARKET_SUMMARY_WINDOW_HOURS:3}
      max-items: ${APP_FEATURED_MARKET_SUMMARY_MAX_ITEMS:10}
      min-items: ${APP_FEATURED_MARKET_SUMMARY_MIN_ITEMS:3}
      ai-enabled: ${APP_FEATURED_MARKET_SUMMARY_AI_ENABLED:true}
      ai-model: ${APP_FEATURED_MARKET_SUMMARY_AI_MODEL:${OPENAI_MODEL:gpt-4o}}
      ai-window-hours: ${APP_FEATURED_MARKET_SUMMARY_AI_WINDOW_HOURS:3}
      ai-max-items: ${APP_FEATURED_MARKET_SUMMARY_AI_MAX_ITEMS:10}
      ai-min-items: ${APP_FEATURED_MARKET_SUMMARY_AI_MIN_ITEMS:3}
      ai-max-input-chars: ${APP_FEATURED_MARKET_SUMMARY_AI_MAX_INPUT_CHARS:12000}
      # In-memory cache only. This helps keep homepage synthesis cost under control.
      ai-cache-minutes: ${APP_FEATURED_MARKET_SUMMARY_AI_CACHE_MINUTES:15}
      snapshot-enabled: ${APP_FEATURED_MARKET_SUMMARY_SNAPSHOT_ENABLED:true}
      snapshot-read-enabled: ${APP_FEATURED_MARKET_SUMMARY_SNAPSHOT_READ_ENABLED:true}
      snapshot-refresh-enabled: ${APP_FEATURED_MARKET_SUMMARY_SNAPSHOT_REFRESH_ENABLED:true}
      snapshot-refresh-cron: ${APP_FEATURED_MARKET_SUMMARY_SNAPSHOT_REFRESH_CRON:0 10 */3 * * *}
      snapshot-max-age-minutes: ${APP_FEATURED_MARKET_SUMMARY_SNAPSHOT_MAX_AGE_MINUTES:180}
  gating:
    free-detail-views: 3
  auth:
    google-login-enabled: false




