# Runtime environment variables:
# - OPENAI_API_KEY
# - OPENAI_API_URL
# - OPENAI_MODEL
# - OPENAI_MAX_TOKENS
# - OPENAI_TEMPERATURE
# - NEWS_API_KEY
# - JASYPT_PASSWORD
# - APP_ADMIN_ALLOWED_USERNAMES
# - APP_BOOTSTRAP_ADMIN_USERNAME
# - APP_BOOTSTRAP_ADMIN_PASSWORD
# - APP_BOOTSTRAP_ADMIN_EMAIL
# - APP_INGESTION_SCHEDULER_ENABLED
# - APP_INGESTION_SCHEDULER_CRON
# - APP_INGESTION_SCHEDULER_PAGE_SIZE
# - APP_INGESTION_BUSINESS_TIMEZONE
# - APP_INGESTION_DOMESTIC_START_HOUR
# - APP_INGESTION_DOMESTIC_END_HOUR
# - APP_INGESTION_BREAKING_BONUS_MINUTES
# - APP_INGESTION_PREFERRED_SOURCE_BONUS_MINUTES
# - APP_NEWS_GLOBAL_ENABLED
# - APP_NEWS_NAVER_ENABLED
# - NAVER_CLIENT_ID
# - NAVER_CLIENT_SECRET
# - APP_NEWS_NAVER_QUERIES
# - APP_NEWS_NAVER_DISPLAY
# - APP_NEWS_NAVER_START
# - APP_MARKET_FX_ENABLED
# - EXCHANGE_RATE_API_KEY
# - APP_MARKET_GOLD_ENABLED
# - METALPRICE_API_KEY
# - APP_MARKET_OIL_ENABLED
# - OILPRICE_API_KEY
# - APP_MARKET_INDEX_PROVIDER
# - APP_MARKET_INDEX_ENABLED
# - TWELVEDATA_API_KEY
# - APP_MARKET_INDEX_SYMBOL_KOSPI
# - APP_MARKET_INDEX_SYMBOL_KOSDAQ
# - MARKET_FORECAST_ENABLED
# - MARKET_FORECAST_WINDOW_HOURS
# - MARKET_FORECAST_MAX_NEWS_ITEMS
# - MARKET_FORECAST_CACHE_MINUTES
server:
  port: ${PORT:8080}

spring:
  application:
    name: macro_news

  messages:
    encoding: UTF-8

  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/macro_news}
    transactions:
      enabled: true Replica set required in production for this to take effecteplica set required in production for this to take effect

  cache:
    type: simple

  thymeleaf:
    cache: false

  web:
    resources:
      cache:
        period: 0

  devtools:
    restart:
      additional-paths: src/main/resources
      enabled: true
    livereload:
      enabled: true

#    oauth2:
#      client:
#        registration:
#          google:
#            client-id: ${GOOGLE_CLIENT_ID:}
#            client-secret: ${GOOGLE_CLIENT_SECRET:}
#            scope:
#              - openid
#              - profile
#              - email

  mvc:
    problemdetails:
      enabled: true

openai:
  api-key: ${OPENAI_API_KEY:}
  api-url: ${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
  models-url: https://api.openai.com/v1/models
  model: ${OPENAI_MODEL:gpt-4o}
  max-tokens: ${OPENAI_MAX_TOKENS:800}
  temperature: ${OPENAI_TEMPERATURE:0.2}
  macro-prompt-file: classpath:ai/prompts/macro_interpretation_prompt.json
  forecast-prompt-file: classpath:ai/prompts/market_forecast_aggregation_prompt.json

jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:}


news:
  api:
    base-url: https://newsapi.org/v2/top-headlines
    search-url: https://newsapi.org/v2/everything
    key: ${NEWS_API_KEY:}
    country: us
    category: business
    default-limit: 10
    recent-query: market OR stocks OR economy OR inflation OR fed OR tariff OR oil OR semiconductor OR korea OR kospi
    recency-hours: 72

logging:
  config: classpath:log4j2-spring.xml

app:
  admin:
    allowed-usernames: ${APP_ADMIN_ALLOWED_USERNAMES:admin01}
    bootstrap-username: ${APP_BOOTSTRAP_ADMIN_USERNAME:admin01}
    bootstrap-password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:kqU58JuYwHS!}
    bootstrap-email: ${APP_BOOTSTRAP_ADMIN_EMAIL:hos0917@naver.com}
  ingestion:
    business-timezone: ${APP_INGESTION_BUSINESS_TIMEZONE:Asia/Seoul}
    domestic-start-hour: ${APP_INGESTION_DOMESTIC_START_HOUR:5}
    domestic-end-hour: ${APP_INGESTION_DOMESTIC_END_HOUR:22}
    breaking-bonus-minutes: ${APP_INGESTION_BREAKING_BONUS_MINUTES:45}
    preferred-source-bonus-minutes: ${APP_INGESTION_PREFERRED_SOURCE_BONUS_MINUTES:15}
    scheduler:
      enabled: ${APP_INGESTION_SCHEDULER_ENABLED:false}
      cron: ${APP_INGESTION_SCHEDULER_CRON:0 0 * * * *}
      page-size: ${APP_INGESTION_SCHEDULER_PAGE_SIZE:3}
  news:
    global:
      enabled: ${APP_NEWS_GLOBAL_ENABLED:true}
    naver:
      enabled: ${APP_NEWS_NAVER_ENABLED:false}
      base-url: ${APP_NEWS_NAVER_BASE_URL:https://openapi.naver.com}
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
      queries: ${APP_NEWS_NAVER_QUERIES:코스피,코스닥,환율,금리,유가,반도체,미국 금리,연준}
      display: ${APP_NEWS_NAVER_DISPLAY:10}
      start: ${APP_NEWS_NAVER_START:1}
  market:
    fx:
      enabled: ${APP_MARKET_FX_ENABLED:false}
      base-url: ${APP_MARKET_FX_BASE_URL:https://v6.exchangerate-api.com}
      api-key: ${EXCHANGE_RATE_API_KEY:}
    gold:
      enabled: ${APP_MARKET_GOLD_ENABLED:false}
      base-url: ${APP_MARKET_GOLD_BASE_URL:https://api.metalpriceapi.com/v1/latest}
      api-key: ${METALPRICE_API_KEY:}
    oil:
      enabled: ${APP_MARKET_OIL_ENABLED:false}
      url: ${APP_MARKET_OIL_URL:https://api.oilpriceapi.com/v1/prices/latest}
      api-key: ${OILPRICE_API_KEY:}
    index:
      provider: ${APP_MARKET_INDEX_PROVIDER:twelvedata}
      enabled: ${APP_MARKET_INDEX_ENABLED:false}
      api-key: ${TWELVEDATA_API_KEY:}
      symbol:
        kospi: ${APP_MARKET_INDEX_SYMBOL_KOSPI:}
        kosdaq: ${APP_MARKET_INDEX_SYMBOL_KOSDAQ:}
  forecast:
    enabled: ${MARKET_FORECAST_ENABLED:true}
    window-hours: ${MARKET_FORECAST_WINDOW_HOURS:3}
    max-news-items: ${MARKET_FORECAST_MAX_NEWS_ITEMS:20}
    cache-minutes: ${MARKET_FORECAST_CACHE_MINUTES:15}
  gating:
    free-detail-views: 3
  auth:
    google-login-enabled: false
