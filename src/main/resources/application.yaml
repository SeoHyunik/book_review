# Runtime secrets / environment-specific values:
# - PORT
# - MONGODB_URI
# - OPENAI_API_KEY
# - SPRING_MAIL_HOST
# - SPRING_MAIL_USERNAME
# - SPRING_MAIL_PASSWORD
# - NEWS_API_KEY
# - JASYPT_PASSWORD
# - APP_ADMIN_ALLOWED_USERNAMES
# - APP_BOOTSTRAP_ADMIN_USERNAME
# - APP_BOOTSTRAP_ADMIN_PASSWORD
# - APP_BOOTSTRAP_ADMIN_EMAIL
# - APP_KEEP_ALIVE_TARGET_URL
# - APP_NOTIFICATION_EMAIL_RECIPIENT
# - APP_NOTIFICATION_EMAIL_FROM
# - NAVER_CLIENT_ID
# - NAVER_CLIENT_SECRET
# - APP_NEWS_GNEWS_API_KEY
# - EXCHANGE_RATE_API_KEY
# - METALPRICE_API_KEY
# - OILPRICE_API_KEY
# - APP_MARKET_INDEX_PUBLIC_DATA_API_KEY
# - TWELVEDATA_API_KEY
# - APP_MARKET_INDEX_SYMBOL_KOSPI
# - APP_MARKET_INDEX_SYMBOL_KOSDAQ
server:
  port: ${PORT:8080}

spring:
  application:
    name: macro_news

  messages:
    encoding: UTF-8

  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/macro_news}
    transactions:
      enabled: true # Replica set required in production for this to take effect

  cache:
    type: simple

  thymeleaf:
    cache: false

  web:
    resources:
      cache:
        period: 0

  devtools:
    restart:
      additional-paths: src/main/resources
      enabled: true
    livereload:
      enabled: true

#    oauth2:
#      client:
#        registration:
#          google:
#            client-id: ${GOOGLE_CLIENT_ID:}
#            client-secret: ${GOOGLE_CLIENT_SECRET:}
#            scope:
#              - openid
#              - profile
#              - email

  mvc:
    problemdetails:
      enabled: true

  mail:
    host: ${SPRING_MAIL_HOST:}
    port: 587
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:true}
openai:
  api-key: ${OPENAI_API_KEY:}
  api-url: https://api.openai.com/v1/chat/completions
  models-url: https://api.openai.com/v1/models
  # Cost-sensitive default for article interpretation and similar base analysis flows.
  model: gpt-4o-mini
  interpretation-model: ${openai.model}
  max-tokens: 800
  temperature: 0.2
  macro-prompt-file: classpath:ai/prompts/macro_interpretation_prompt.json
  forecast-prompt-file: classpath:ai/prompts/market_forecast_aggregation_prompt.json
  featured-market-summary-prompt-file: classpath:ai/prompts/featured_market_summary_prompt.json
  pricing:
    interpretation-model-name: ${OPENAI_PRICING_INTERPRETATION_MODEL:${openai.interpretation-model}}
    interpretation-model:
      prompt-per-1k-usd: 0.00015
      completion-per-1k-usd: 0.0006
    summary-model-name: ${OPENAI_PRICING_SUMMARY_MODEL:${app.featured.market-summary.ai-model}}
    summary-model:
      prompt-per-1k-usd: 0.00125
      completion-per-1k-usd: 0.01
    primary-model-name: ${OPENAI_PRICING_PRIMARY_MODEL:${openai.model}}
    primary-model:
      prompt-per-1k-usd: 0.005
      completion-per-1k-usd: 0.015
    default:
      prompt-per-1k-usd: 0.005
      completion-per-1k-usd: 0.015
  cost:
    krw-fallback-rate: 1350.0
    daily-days: 7
    monthly-months: 6

jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:}


news:
  api:
    base-url: https://newsapi.org/v2/top-headlines
    search-url: https://newsapi.org/v2/everything
    key: ${NEWS_API_KEY:}
    country: us
    category: business
    default-limit: 5
    # Primary foreign/global NewsAPI query.
    recent-query: market OR stocks OR inflation OR fed OR tariff OR oil OR semiconductor OR usd OR kospi OR selloff OR rally
    # Secondary recent-query variant used only when the primary recent search underfills.
    recent-query-fallback: breaking market OR intraday stocks OR fed OR inflation OR tariff OR oil OR semiconductor OR usd OR kospi
    # Macro relevance filter applied to title + description.
    filter-keywords: korea,kospi,kosdaq,volatility,oil,usd,interest rate,inflation,gold,semiconductor,tariff,fed
    recency-hours: 72

logging:
  config: classpath:log4j2-spring.xml

app:
  admin:
    allowed-usernames: ${APP_ADMIN_ALLOWED_USERNAMES:}
    bootstrap-username: ${APP_BOOTSTRAP_ADMIN_USERNAME:}
    bootstrap-password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}
    bootstrap-email: ${APP_BOOTSTRAP_ADMIN_EMAIL:}
  ingestion:
    business-timezone: Asia/Seoul
    domestic-start-hour: 5
    domestic-end-hour: 22
    breaking-bonus-minutes: 45
    preferred-source-bonus-minutes: 15
    scheduler:
      enabled: false
      cron: 0 */30 * * * *
      page-size: 5
  keep-alive:
    # Static gate for keep-alive availability. Default remains false because external uptime monitoring
    # is more reliable than self-calling the same Render public URL from inside the app.
    enabled: false
    # Runtime toggle state is in-memory only and resets on restart or redeploy.
    cron: 0 */10 * * * *
    # Required for effective keep-alive execution. Prefer an external monitor or GitHub Actions ping.
    target-url: ${APP_KEEP_ALIVE_TARGET_URL:}
  notification:
    email:
      # Static gate for email notification availability. Admin runtime toggle can only operate when this is true.
      enabled: false
      # Required for effective email notification delivery.
      recipient: ${APP_NOTIFICATION_EMAIL_RECIPIENT:}
      # Spring mail sender configuration is also required; runtime toggle state resets on restart or redeploy.
      from: ${APP_NOTIFICATION_EMAIL_FROM:}
  news:
    cleanup:
      cron: 0 0 * * * *
    global:
      enabled: true
      max-age-hours: 24
      fallback-max-age-hours: 36
    naver:
      enabled: ${APP_NEWS_NAVER_ENABLED:false}
      base-url: https://openapi.naver.com
      client-id: ${NAVER_CLIENT_ID:}
      client-secret: ${NAVER_CLIENT_SECRET:}
      # If left blank, NAVER falls back to a small high-specificity macro query set
      # and only probes the first couple of result pages by default.
      queries: ""
      display: 5
      start: 1
      max-pages: 2
      max-age-hours: 12
      fallback-max-age-hours: 24
    gnews:
      enabled: false
      base-url: https://gnews.io/api/v4/search
      api-key: ${APP_NEWS_GNEWS_API_KEY:}
      query: market OR stocks OR inflation OR fed OR tariff OR oil OR semiconductor OR usd OR kospi
      lang: en
      country: us
      max-age-hours: 24
      fallback-max-age-hours: 36
  market:
    fx:
      enabled: false
      base-url: https://v6.exchangerate-api.com
      api-key: ${EXCHANGE_RATE_API_KEY:}
    gold:
      enabled: false
      base-url: https://api.metalpriceapi.com/v1/latest
      api-key: ${METALPRICE_API_KEY:}
    oil:
      enabled: false
      url: https://api.oilpriceapi.com/v1/prices/latest
      api-key: ${OILPRICE_API_KEY:}
    index:
      provider: twelvedata
      enabled: false
      api-key: ${APP_MARKET_INDEX_PUBLIC_DATA_API_KEY:${TWELVEDATA_API_KEY:}}
      symbol:
        kospi: ${APP_MARKET_INDEX_SYMBOL_KOSPI:}
        kosdaq: ${APP_MARKET_INDEX_SYMBOL_KOSDAQ:}
  forecast:
    enabled: ${MARKET_FORECAST_ENABLED:true}
    window-hours: ${MARKET_FORECAST_WINDOW_HOURS:3}
    max-news-items: ${MARKET_FORECAST_MAX_NEWS_ITEMS:20}
    cache-minutes: ${MARKET_FORECAST_CACHE_MINUTES:15}
  featured:
    market-summary:
      # Deterministic recent analyzed-news aggregation for the main featured card.
      # If not enough recent analyzed items exist, the homepage falls back to the
      # existing market forecast snapshot or featured news behavior.
      enabled: true
      window-hours: 3
      max-items: 10
      min-items: 3
      ai-enabled: true
      # Dedicated stronger model for current/featured market summary generation.
      ai-model: gpt-5
      ai-window-hours: 3
      ai-max-items: 10
      ai-min-items: 3
      ai-max-input-chars: 12000
      # In-memory cache only. This helps keep homepage synthesis cost under control.
      ai-cache-minutes: 15
      snapshot-enabled: true
      snapshot-read-enabled: true
      snapshot-refresh-enabled: true
      snapshot-refresh-cron: 0 10 */3 * * *
      snapshot-max-age-minutes: 180
  gating:
    free-detail-views: 3
  auth:
    google-login-enabled: false
