server:
  port: 8081

spring:
  application:
    name: book_review

  data:
    mongodb:
      uri: mongodb://localhost:27017/book_review

  mongodb:
    transactions:
      enabled: true # Replica set required in production for this to take effect

  thymeleaf:
    cache: false

  web:
    resources:
      cache:
        period: 0

  devtools:
    restart:
      additional-paths: src/main/resources
      enabled: true
    livereload:
      enabled: true

  security:
    user:
      name: user
      password: pass123

  mvc:
    problemdetails:
      enabled: true

