# Runtime environment variables:
# - OPENAI_API_KEY
# - OPENAI_API_URL
# - OPENAI_MODEL
# - OPENAI_MAX_TOKENS
# - OPENAI_TEMPERATURE
# - NEWS_API_KEY
# - JASYPT_PASSWORD
server:
  port: ${PORT:8080}

spring:
  application:
    name: macro_news

  messages:
    encoding: UTF-8

  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/macro_news}
    transactions:
      enabled: true Replica set required in production for this to take effecteplica set required in production for this to take effect

  cache:
    type: simple

  thymeleaf:
    cache: false

  web:
    resources:
      cache:
        period: 0

  devtools:
    restart:
      additional-paths: src/main/resources
      enabled: true
    livereload:
      enabled: true

#    oauth2:
#      client:
#        registration:
#          google:
#            client-id: ${GOOGLE_CLIENT_ID:}
#            client-secret: ${GOOGLE_CLIENT_SECRET:}
#            scope:
#              - openid
#              - profile
#              - email

  mvc:
    problemdetails:
      enabled: true

openai:
  api-key: ${OPENAI_API_KEY:}
  api-url: ${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
  models-url: https://api.openai.com/v1/models
  model: ${OPENAI_MODEL:gpt-4o}
  max-tokens: ${OPENAI_MAX_TOKENS:800}
  temperature: ${OPENAI_TEMPERATURE:0.2}
  macro-prompt-file: classpath:ai/prompts/macro_interpretation_prompt.json

jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:}


news:
  api:
    base-url: https://newsapi.org/v2/top-headlines
    search-url: https://newsapi.org/v2/everything
    key: ${NEWS_API_KEY:}
    country: us
    category: business
    default-limit: 10
    recent-query: market OR stocks OR economy OR inflation OR fed OR tariff OR oil OR semiconductor OR korea OR kospi
    recency-hours: 72

logging:
  config: classpath:log4j2-spring.xml

app:
  gating:
    free-detail-views: 3
  auth:
    google-login-enabled: false
