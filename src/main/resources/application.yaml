# - APP_FEATURED_MARKET_SUMMARY_WINDOW_HOURS
# - APP_FEATURED_MARKET_SUMMARY_MAX_ITEMS
# - APP_FEATURED_MARKET_SUMMARY_MIN_ITEMS
# - APP_FEATURED_MARKET_SUMMARY_AI_ENABLED
# - APP_FEATURED_MARKET_SUMMARY_AI_MODEL
