<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content})}">
<th:block th:fragment="content">
    <section class="mb-4 d-flex flex-column flex-md-row justify-content-between align-items-start gap-3">
        <div>
            <h1 class="h3 fw-bold mb-1" th:text="#{admin.news.heading}">Admin News Ingestion</h1>
            <p class="text-secondary mb-0" th:text="#{admin.news.auto.subheading}">Fetch latest external news automatically.</p>
        </div>
        <div class="d-flex flex-wrap gap-2">
            <a class="btn btn-outline-primary" th:href="@{/admin/news/manual}" th:text="#{admin.news.manual.tab}">Manual Ingestion</a>
            <a class="btn btn-primary" th:href="@{/admin/news/auto}" th:text="#{admin.news.auto.tab}">Automatic Ingestion</a>
            <a class="btn btn-outline-secondary" th:href="@{/news}" th:text="#{admin.news.viewNews}">View News</a>
        </div>
    </section>

    <section class="mb-4" th:if="${newsApiConfigured == false}">
        <div class="alert alert-warning mb-0" role="alert" th:text="#{admin.news.auto.warning}">
            Automatic ingestion requires external news API configuration (`news.api.key`). Manual ingestion is still available.
        </div>
    </section>

    <section class="mb-4">
        <form th:action="@{/admin/news/ingest-api}" method="post" class="card border-0 shadow-sm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="card-body d-flex flex-column flex-md-row align-items-md-end gap-3 justify-content-between">
                <div>
                    <label class="form-label" for="pageSize" th:text="#{admin.news.auto.fetchPageSize}">Fetch Page Size</label>
                    <input id="pageSize" name="pageSize" type="number" min="1" max="50" value="10" class="form-control"
                           th:disabled="${newsApiConfigured == false}">
                </div>
                <button class="btn btn-primary text-nowrap" type="submit" th:disabled="${newsApiConfigured == false}" th:text="#{admin.news.auto.submit}">Fetch Latest News</button>
            </div>
        </form>
    </section>

    <div id="auto-batch-status-region"
         th:replace="~{admin/news/fragments/auto-batch-status :: autoBatchStatusPanel}"></div>

    <script th:if="${autoBatchStatus != null}">
        (function () {
            let intervalId = null;

            function getPanel() {
                return document.getElementById('auto-batch-status-panel');
            }

            async function refreshPanel() {
                const panel = getPanel();
                if (!panel) {
                    stopPolling();
                    return;
                }

                const ingestedCount = Number(panel.dataset.ingestedCount || '0');
                if (ingestedCount <= 0) {
                    stopPolling();
                    return;
                }

                const params = new URLSearchParams({
                    requestedCount: panel.dataset.requestedCount || '0',
                    returnedCount: panel.dataset.returnedCount || '0',
                    itemIds: panel.dataset.itemIds || ''
                });

                try {
                    const response = await fetch(panel.dataset.statusUrl + '?' + params.toString(), {
                        method: 'GET',
                        headers: { 'X-Requested-With': 'XMLHttpRequest' },
                        credentials: 'same-origin'
                    });
                    if (!response.ok) {
                        stopPolling();
                        return;
                    }
                    const html = (await response.text()).trim();
                    if (!html) {
                        stopPolling();
                        return;
                    }
                    panel.outerHTML = html;
                    const updatedPanel = getPanel();
                    if (!updatedPanel || Number(updatedPanel.dataset.ingestedCount || '0') <= 0) {
                        stopPolling();
                    }
                } catch (error) {
                    stopPolling();
                }
            }

            function stopPolling() {
                if (intervalId !== null) {
                    window.clearInterval(intervalId);
                    intervalId = null;
                }
            }

            const initialPanel = getPanel();
            if (initialPanel && Number(initialPanel.dataset.ingestedCount || '0') > 0) {
                intervalId = window.setInterval(refreshPanel, 3000);
            }
        })();
    </script>
</th:block>
</html>
