<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content})}">
<th:block th:fragment="content">
    <section class="mb-4 d-flex justify-content-between align-items-start gap-3">
        <div>
            <h1 class="h3 fw-bold mb-1">Admin News Ingestion</h1>
            <p class="text-secondary mb-0">Manually ingest a single news event or fetch latest external news.</p>
        </div>
        <a class="btn btn-outline-primary" th:href="@{/news}">View News</a>
    </section>

    <section class="mb-4">
        <form th:action="@{/admin/news/ingest-api}" method="post" class="card border-0 shadow-sm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="card-body d-flex flex-column flex-md-row align-items-md-end gap-3">
                <div>
                    <label class="form-label" for="pageSize">Fetch Page Size</label>
                    <input id="pageSize" name="pageSize" type="number" min="1" max="50" value="10" class="form-control">
                </div>
                <button class="btn btn-outline-primary" type="submit">Fetch Latest News</button>
            </div>
        </form>
    </section>

    <section class="mb-4">
        <form th:action="@{/admin/news/ingest}" th:object="${adminIngestionRequest}" method="post"
              class="card border-0 shadow-sm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="card-body d-flex flex-column gap-3">
                <div>
                    <label class="form-label" for="source">Source</label>
                    <input id="source" type="text" class="form-control" th:field="*{source}" required>
                </div>
                <div>
                    <label class="form-label" for="title">Title</label>
                    <input id="title" type="text" class="form-control" th:field="*{title}" required>
                </div>
                <div>
                    <label class="form-label" for="summary">Summary</label>
                    <textarea id="summary" class="form-control" th:field="*{summary}" rows="3"></textarea>
                </div>
                <div>
                    <label class="form-label" for="content">Content</label>
                    <textarea id="content" class="form-control" th:field="*{content}" rows="8"></textarea>
                </div>
                <div>
                    <label class="form-label" for="url">URL</label>
                    <input id="url" type="url" class="form-control" th:field="*{url}">
                </div>
                <div>
                    <label class="form-label" for="publishedAt">Published At</label>
                    <input id="publishedAt" type="datetime-local" class="form-control" th:field="*{publishedAt}" required>
                </div>
            </div>
            <div class="card-footer bg-white border-0 d-flex justify-content-end gap-2">
                <a class="btn btn-outline-secondary" th:href="@{/news}">Cancel</a>
                <button class="btn btn-primary" type="submit">Ingest Manually</button>
            </div>
        </form>
    </section>

    <section>
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <h2 class="h5 fw-bold mb-3">Recent Operational Items</h2>
                <div class="table-responsive">
                    <table class="table table-striped align-middle mb-0">
                        <thead>
                        <tr>
                            <th>Title</th>
                            <th>Source</th>
                            <th>Published At</th>
                            <th>Status</th>
                            <th class="text-end">Actions</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:if="${#lists.isEmpty(recentNewsItems)}">
                            <td colspan="5" class="text-secondary">No recent items.</td>
                        </tr>
                        <tr th:each="item : ${recentNewsItems}">
                            <td th:text="${item.title}"></td>
                            <td th:text="${item.source}"></td>
                            <td th:text="${item.publishedAt}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${item.status.name() == 'ANALYZED' ? ' bg-success' : (item.status.name() == 'FAILED' ? ' bg-danger' : ' bg-secondary')}"
                                      th:text="${item.status}"></span>
                            </td>
                            <td class="text-end">
                                <div class="d-inline-flex gap-2">
                                    <a class="btn btn-sm btn-outline-primary" th:href="@{'/news/' + ${item.id}}">Detail</a>
                                    <form th:action="@{'/admin/news/' + ${item.id} + '/reinterpret'}" method="post" class="d-inline">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                        <button type="submit" class="btn btn-sm btn-outline-warning">Re-interpret</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>
</th:block>
</html>
