<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::content})}">
<th:block th:fragment="content">
    <section class="mb-4 d-flex flex-column flex-md-row justify-content-between align-items-start gap-3">
        <div>
            <h1 class="h3 fw-bold mb-1">Macro News</h1>
            <p class="text-secondary mb-0">Recent manually ingested news events.</p>
        </div>
        <a class="btn btn-outline-primary" th:href="@{/admin/news}">Admin Ingestion</a>
    </section>

    <section>
        <div class="table-responsive">
            <table class="table table-striped align-middle">
                <thead>
                <tr>
                    <th>Title</th>
                    <th>Source</th>
                    <th>Published At</th>
                    <th>Status</th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(newsEvents)}">
                    <td colspan="5" class="text-secondary">No news events found.</td>
                </tr>
                <tr th:each="news : ${newsEvents}">
                    <td th:text="${news.title}"></td>
                    <td th:text="${news.source}"></td>
                    <td th:text="${news.publishedAt}"></td>
                    <td><span class="badge bg-secondary" th:text="${news.status}"></span></td>
                    <td class="text-end"><a class="btn btn-sm btn-outline-primary" th:href="@{'/news/' + ${news.id}}">Detail</a></td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</th:block>
</html>
